[about]
intro = """
I am a first-year Ph.D. student in the [Cryptography and Security](https://users-cs.au.dk/orlandi/cryptogroup/) group at [Aarhus University](https://international.au.dk/), where I am fortunate to be advised by [Peter Scholl](https://pascholl.github.io/) and [Diego F. Aranha](https://dfaranha.github.io/). Prior to this, I was a pre-doctoral researcher at [IIT Bombay Trust Lab](https://trustlab.iitb.ac.in/), hosted by [Chethan Kamath](https://www.cse.iitb.ac.in/~ckamath/) and [Sruthi Sekar](https://sruthisekar.wordpress.com/). I completed a B.Sc. in Mathematics and Computer Science at [Ashoka University](https://www.ashoka.edu.in/).

My research is in theoretical and practical aspects of cryptography, with current interests around correlated randomness in secure computation, indistinguishability obfuscation, and complexity-theoretic techniques in cryptographic protocols.
"""
interests = [
  "pseudorandom correlations",
  "indistinguishability obfuscation",
  "cryptography and complexity theory"
]

# Left-column title on /research/.
[research]
heading = "Cryptography and complexity"
summary = '''
I am mainly interested in the algebraic and complexity-theoretic foundations of cryptographic protocols. At the moment, I am thinking about PCFs for \(\mathsf{VOLE}\) from \(\mathsf{DCR}\)-like assumptions, and investigating the feasibility of building polynomial iO using proof complexity techniques. I also have prior work on private originator tracing for end-to-end encrypted messaging.
'''

[[research.directions]]
title = "Pseudorandom correlations"
text = "Constructions of PCGs/PCFs for additive correlations from algebraic assumptions."

[[research.directions]]
title = "Cryptographic notions from proof complexity"
text = "Feasibility of cryptographic primitives from proof complexity techniques."

[[research.manuscripts]]
title = "ATAVISM: Private Originator Tracing in End-to-End Encrypted Messaging"
authors = [
  { name = "Archisman Dutta", url = "/" },
  { name = "Debayan Gupta", url = "https://debayangupta.com/" },
  { name = "Arup Mondal", url = "https://www.ashoka.edu.in/profile/arup-mondal/" }
]
status = "Manuscript, in submission"
year = "2025"
abstract_text = """
ATAVISM studies private originator tracing for end-to-end encrypted messaging. The protocol aims to identify the originator of a reported forwarding chain while preserving the privacy of intermediate parties and retaining the essential privacy guarantees of end-to-end encryption. The work formalizes the tracing problem, compares against existing approaches, and includes an implementation and benchmark evaluation.
"""
links = []

